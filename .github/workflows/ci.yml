name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check src/
      - name: Run ruff format check
        run: ruff format --check src/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxkbcommon-x11-0 xvfb
      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-cov
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          pytest tests/ --cov=src/laitoxx --cov-report=term-missing \
            --ignore=tests/test_web_bridge_stress.py -q
